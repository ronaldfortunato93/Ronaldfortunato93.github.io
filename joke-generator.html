<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        .joke-box {
            background-color: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 2rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joke-text {
            font-size: 1.2rem;
            color: #333;
            line-height: 1.6;
            font-weight: 500;
        }

        .joke-setup {
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .joke-delivery {
            margin-top: 1rem;
            color: #667eea;
            font-style: italic;
        }

        .loading {
            color: #667eea;
            font-size: 1.1rem;
        }

        .error {
            color: #e74c3c;
            font-size: 1.1rem;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .joke-type {
            font-size: 0.9rem;
            color: #999;
            margin-top: 1rem;
        }

        nav {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
        }

        nav a {
            color: #667eea;
            text-decoration: none;
            margin: 0 1rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😄 Joke Generator</h1>
        
        <div class="joke-box" id="jokeBox">
            <div class="joke-text">Click the button below to get a random joke!</div>
        </div>

        <button id="jokeBtn" onclick="fetchJoke()">Get a Joke</button>

        <div class="joke-type" id="jokeType"></div>

        <nav>
            <a href="index.html">← Back to Home</a>
        </nav>
    </div>

    <script>
        const jokeBox = document.getElementById('jokeBox');
        const jokeBtn = document.getElementById('jokeBtn');
        const jokeType = document.getElementById('jokeType');

        async function fetchJoke() {
            // Disable button and show loading state
            jokeBtn.disabled = true;
            jokeBox.innerHTML = '<div class="loading">Loading a joke...</div>';
            jokeType.innerHTML = '';

            try {
                // Fetch joke from JokeAPI (https://jokeapi.dev/)
                const response = await fetch('https://v2.jokeapi.dev/joke/Any?type=single,twopart');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                // Display the joke based on type
                if (data.type === 'single') {
                    // Single-part joke
                    jokeBox.innerHTML = `<div class="joke-text">${data.joke}</div>`;
                } else if (data.type === 'twopart') {
                    // Two-part joke (setup and delivery)
                    jokeBox.innerHTML = `
                        <div class="joke-text">
                            <div class="joke-setup">${data.setup}</div>
                            <div class="joke-delivery">${data.delivery}</div>
                        </div>
                    `;
                }

                // Display joke category
                jokeType.innerHTML = `<strong>Category:</strong> ${data.category}`;

            } catch (error) {
                jokeBox.innerHTML = `<div class="error">Oops! ${error.message}. Please try again.</div>`;
            } finally {
                // Re-enable button
                jokeBtn.disabled = false;
            }
        }

        // Load a joke when page first loads
        window.addEventListener('load', fetchJoke);
    </script>
</body>
</html>
